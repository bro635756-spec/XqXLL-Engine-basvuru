<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XQ Studio® | Developer Portal</title>
    <style>
        :root { 
            --xq-orange: #ff9900; 
            --bg: #05070a; 
            --card: #0d1117; 
            --border: #30363d; 
            --text: #c9d1d9; 
            --text-dim: #8b949e;
            --whatsapp: #25D366;
            --discord: #5865F2;
        }
        body { 
            background: var(--bg); 
            background-image: radial-gradient(circle at 50% 0%, #1a1f26 0%, transparent 50%);
            color: var(--text); 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; padding: 20px; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .main-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 20px; 
            padding: 40px; width: 100%; max-width: 440px; box-shadow: 0 25px 50px rgba(0,0,0,0.8); 
        }
        .header { text-align: center; margin-bottom: 35px; }
        .header h1 { color: var(--xq-orange); margin: 0; font-size: 30px; letter-spacing: 3px; font-weight: 900; }
        
        .social-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .social-btn { 
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 12px; border-radius: 12px; text-decoration: none; color: white;
            font-weight: 700; font-size: 13px; transition: 0.3s;
        }
        .btn-dc { background: var(--discord); }
        .btn-wa { background: var(--whatsapp); }
        .social-btn img { width: 22px; height: 22px; object-fit: contain; }
        .social-btn:hover { transform: translateY(-3px); }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; font-weight: 800; }
        input, select { 
            width: 100%; padding: 14px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); 
            border-radius: 10px; color: white; font-size: 15px; box-sizing: border-box; outline: none;
        }
        input:focus, select:focus { border-color: var(--xq-orange); }

        .btn-submit { 
            width: 100%; padding: 18px; background: var(--xq-orange); color: black; 
            border: none; border-radius: 12px; font-weight: 900; font-size: 16px; 
            cursor: pointer; transition: 0.3s;
        }
        .btn-submit:hover { background: #e68a00; }

        .status-ui { padding: 30px; border-radius: 15px; text-align: center; border: 2px solid; animation: fadeIn 0.4s ease; }
        .status-pending { border-color: #f1c40f; background: rgba(241, 196, 15, 0.1); color: #f1c40f; }
        .status-success { border-color: #2ecc71; background: rgba(46, 204, 113, 0.1); color: #2ecc71; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header">
        <h1>XQ STUDIO</h1>
        <p style="color:var(--text-dim); font-size:13px;">Geliştirici Başvuru Portalı</p>
    </div>

    <div id="dynamic-content">
        <div class="social-container">
            <a href="https://discord.gg/6SG7rsKsRq" target="_blank" class="social-btn btn-dc">
                <img src="logod.png" alt="DC"> DISCORD
            </a>
            <a href="https://whatsapp.com/channel/0029VbCjhhZ8PgsFTg0Fcd3I" target="_blank" class="social-btn btn-wa">
                <img src="logow.png" alt="WA"> WHATSAPP
            </a>
        </div>

        <div class="form-group">
            <label>Ad Soyad</label>
            <input type="text" id="full_name" placeholder="Örn: Burak XQ">
        </div>

        <div class="form-group">
            <label>Uzmanlık Alanı</label>
            <select id="user_role">
                <option value="C++ Developer (XqXLL)">C++ Developer (XqXLL)</option>
                <option value="Unreal Engine 5 Expert">Unreal Engine 5 Expert</option>
                <option value="Cyber Security & Kernel">Cyber Security & Kernel</option>
                <option value="UI/UX Designer">UI/UX Designer</option>
            </select>
        </div>

        <button class="btn-submit" id="submit_trigger">BAŞVURUYU GÖNDER</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyAFtCQjGACAmoOSEIazC648I1BaLPkT8-U", // API Key'i güncelledim
    authDomain: "share-your-thoughts-e15a7.firebaseapp.com",
    databaseURL: "https://share-your-thoughts-e15a7-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "share-your-thoughts-e15a7",
    storageBucket: "share-your-thoughts-e15a7.firebasestorage.app",
    messagingSenderId: "137665399298",
    appId: "1:137665399298:web:60e7087fc41db2670f751b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// WEBHOOK LINKINI BURAYA YAPIŞTIR
const webhookURL = "BURAYA_YENI_WEBHOOK_LINKINI_KOY";

// BURAK11 RESET KODU
let keyLog = "";
window.addEventListener('keydown', (e) => {
    keyLog += e.key;
    if (keyLog.includes("burak11")) {
        localStorage.clear();
        alert("SİSTEM RESETLENDİ");
        location.reload();
    }
    if (keyLog.length > 10) keyLog = keyLog.substring(1);
});

const btn = document.getElementById("submit_trigger");
btn.addEventListener("click", handleApplication);

async function handleApplication(){
    const name = document.getElementById("full_name").value.trim();
    const role = document.getElementById("user_role").value;

    if(name.length < 3){
        alert("Lütfen geçerli bir isim giriniz.");
        return;
    }

    btn.disabled = true;
    btn.innerText = "İŞLENİYOR...";

    const appID = "XQ-" + Math.floor(1000 + Math.random() * 9000);

    try {
        await set(ref(db, "apps/" + appID), {
            name: name,
            role: role,
            status: "beklemede",
            createdAt: Date.now()
        });

        localStorage.setItem("xq_app_id", appID);

        // DISCORD WEBHOOK (no-cors ve düz metin desteğiyle)
        await fetch(webhookURL, {
            method: "POST",
            mode: "no-cors", 
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                content: `🚀 **Yeni Ekip Başvurusu**\n**ID:** \`${appID}\`\n**İsim:** ${name}\n**Rol:** ${role}`
            })
        });

        location.reload();
    } catch(err) {
        alert("Hata: " + err.message);
        btn.disabled = false;
        btn.innerText = "BAŞVURUYU GÖNDER";
    }
}

const activeApp = localStorage.getItem("xq_app_id");
if(activeApp){
    onValue(ref(db, "apps/" + activeApp), (snapshot) => {
        const data = snapshot.val();
        if(data) showStatus(data.status, activeApp);
    });
}

function showStatus(status, id){
    const root = document.getElementById("dynamic-content");
    let html = `<div style="text-align:center; margin-bottom:15px; font-family:monospace; font-size:11px;">AUTH_ID: ${id}</div>`;
    
    if(status === "beklemede"){
        html += `<div class="status-ui status-pending"><h3>İNCELEME SÜRÜYOR</h3><p>Başvurunuz yöneticilere iletildi.</p></div>`;
    } else if(status === "onay" || status === "admin"){
        html += `<div class="status-ui status-success"><h3>BAŞVURU KABUL EDİLDİ</h3><p>Ekibe hoş geldiniz!</p><a href="https://discord.gg/6SG7rsKsRq" target="_blank"><button class="btn-submit" style="background:var(--discord); color:white; margin-top:15px;">DISCORD'A GİRİŞ</button></a></div>`;
    }
    root.innerHTML = html;
}
</script>
</body>
</html>
