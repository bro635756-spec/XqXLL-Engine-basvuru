<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XQ Studio® | Developer Portal</title>
    <style>
        :root { 
            --xq-orange: #ff9900; 
            --bg: #05070a; 
            --card: #0d1117; 
            --border: #30363d; 
            --text: #c9d1d9; 
            --text-dim: #8b949e;
            --whatsapp: #25D366;
            --discord: #5865F2;
        }
        body { 
            background: var(--bg); 
            background-image: radial-gradient(circle at 50% 0%, #1a1f26 0%, transparent 50%);
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 20px; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .main-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 20px; 
            padding: 40px; width: 100%; max-width: 440px; box-shadow: 0 25px 50px rgba(0,0,0,0.8); 
        }
        .header { text-align: center; margin-bottom: 35px; }
        .header h1 { color: var(--xq-orange); margin: 0; font-size: 30px; letter-spacing: 3px; font-weight: 900; }
        
        .social-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .social-btn { 
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 12px; border-radius: 12px; text-decoration: none; color: white;
            font-weight: 700; font-size: 13px; transition: 0.3s;
        }
        .btn-dc { background: var(--discord); }
        .btn-wa { background: var(--whatsapp); }
        .social-btn img { width: 22px; height: 22px; object-fit: contain; }
        
        .form-group { margin-bottom: 20px; }
        .hidden-question { display: none; margin-top: 15px; border-left: 2px solid var(--xq-orange); padding-left: 15px; }
        
        label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; font-weight: 800; }
        input, select { 
            width: 100%; padding: 14px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); 
            border-radius: 10px; color: white; font-size: 15px; box-sizing: border-box; outline: none;
        }
        input:focus, select:focus { border-color: var(--xq-orange); }

        .btn-submit { 
            width: 100%; padding: 18px; background: var(--xq-orange); color: black; 
            border: none; border-radius: 12px; font-weight: 900; font-size: 16px; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header">
        <h1>XQ STUDIO</h1>
        <p style="color:var(--text-dim); font-size:12px;">XqXLL Engine & System Development</p>
    </div>

    <div id="dynamic-content">
        <div class="social-container">
            <a href="https://discord.gg/6SG7rsKsRq" target="_blank" class="social-btn btn-dc">
                <img src="logod.png" alt="DC"> DISCORD
            </a>
            <a href="https://whatsapp.com/channel/0029VbCjhhZ8PgsFTg0Fcd3I" target="_blank" class="social-btn btn-wa">
                <img src="logow.png" alt="WA"> WHATSAPP
            </a>
        </div>

        <div class="form-group">
            <label>Ad Soyad</label>
            <input type="text" id="full_name" placeholder="Örn: Burak XQ">
        </div>

        <div class="form-group">
            <label>Uzmanlık Alanı</label>
            <select id="user_role" onchange="checkRole()">
                <option value="">Seçiniz...</option>
                <option value="XqXLL Engine Developer (C++)">XqXLL Engine Developer (C++)</option>
                <option value="Research & Development (Araştırmacı)">Research & Development (Araştırmacı)</option>
            </select>
        </div>

        <div id="ai_question_box" class="hidden-question">
            <label>Geliştirme Metodu</label>
            <select id="dev_method">
                <option value="Öz Bilgi (Kendi Algoritmalarım)">Öz Bilgi (Kendi Algoritmalarım)</option>
                <option value="AI Destekli (Prompt Mühendisliği)">AI Destekli (Prompt Mühendisliği)</option>
                <option value="Hibrit (Her İkisi)">Hibrit (Her İkisi)</option>
            </select>
        </div>

        <button class="btn-submit" id="submit_trigger" style="margin-top: 20px;">BAŞVURUYU GÖNDER</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyAFtCQjGACAmoOSEIazC648I1BaLPkT8-U",
    authDomain: "share-your-thoughts-e15a7.firebaseapp.com",
    databaseURL: "https://share-your-thoughts-e15a7-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "share-your-thoughts-e15a7",
    storageBucket: "share-your-thoughts-e15a7.firebasestorage.app",
    messagingSenderId: "137665399298",
    appId: "1:137665399298:web:60e7087fc41db2670f751b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const webhookURL = "https://discord.com/api/webhooks/1502733551802519647/ZB_4VTXethUShwZn80vfTJG3uw3Z_JV363XI_AXBvVolk7IA8qAXXEVJQCXmzT_FdeO9";

window.checkRole = () => {
    const role = document.getElementById('user_role').value;
    const box = document.getElementById('ai_question_box');
    // Eğer C++ geliştirici seçilirse AI sorusu çıkar
    box.style.display = (role.includes("C++")) ? "block" : "none";
};

// burak11 reset
let k = "";
window.addEventListener('keydown', (e) => {
    k += e.key;
    if (k.includes("burak11")) { localStorage.clear(); location.reload(); }
    if (k.length > 10) k = k.substring(1);
});

document.getElementById("submit_trigger").onclick = async () => {
    const name = document.getElementById("full_name").value;
    const role = document.getElementById("user_role").value;
    const method = document.getElementById("dev_method").value;

    if(!name || !role) return alert("Alanları doldur.");

    const id = "XQ-" + Math.floor(1000 + Math.random() * 9000);
    
    try {
        await set(ref(db, 'apps/' + id), { name, role, method: (role.includes("C++") ? method : "N/A"), status: 'beklemede' });
        localStorage.setItem('xq_app_id', id);

        await fetch(webhookURL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                content: `🚀 **XQ Studio Yeni Başvuru**\n**ID:** \`${id}\`\n**İsim:** ${name}\n**Alan:** ${role}${role.includes("C++") ? `\n**Metod:** ${method}` : ""}`
            })
        });
        location.reload();
    } catch(e) { alert("Hata oluştu."); }
};

const activeApp = localStorage.getItem('xq_app_id');
if(activeApp) {
    onValue(ref(db, 'apps/' + activeApp), (snapshot) => {
        const d = snapshot.val();
        if(d) {
            document.getElementById('dynamic-content').innerHTML = `
                <div style="text-align:center; padding:20px; border:1px solid var(--xq-orange); border-radius:10px;">
                    <h3 style="color:var(--xq-orange)">BAŞVURU ALINDI</h3>
                    <p style="font-size:12px;">ID: ${activeApp}</p>
                    <p>Durum: ${d.status.toUpperCase()}</p>
                </div>`;
        }
    });
}
</script>
</body>
</html>
