<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XQ Studio® | Hub</title>
    <style>
        :root { 
            --xq-orange: #ff9900; 
            --bg: #05070a; 
            --card: #0d1117; 
            --border: #30363d; 
            --text: #c9d1d9; 
            --text-dim: #8b949e;
            --discord: #5865F2;
        }
        body { 
            background: var(--bg); 
            background-image: radial-gradient(circle at 50% 0%, #1a1f26 0%, transparent 50%);
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 20px; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh; 
        }
        .main-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 16px; 
            padding: 40px; width: 100%; max-width: 450px; box-shadow: 0 20px 40px rgba(0,0,0,0.7); 
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--xq-orange); margin: 0; font-size: 26px; letter-spacing: 2px; }
        
        .social-link { 
            display: flex; align-items: center; justify-content: center; 
            padding: 14px; border-radius: 10px; text-decoration: none; color: white;
            font-weight: 600; background: var(--discord); margin-bottom: 25px; transition: 0.3s;
        }
        .social-link:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 5px; text-transform: uppercase; }
        input, select { 
            width: 100%; padding: 12px; background: #0b0e14; border: 1px solid var(--border); 
            border-radius: 8px; color: white; box-sizing: border-box; 
        }
        .btn-submit { 
            width: 100%; padding: 15px; background: var(--xq-orange); color: black; 
            border: none; border-radius: 8px; font-weight: 800; cursor: pointer; margin-top: 10px;
        }

        .status-box { padding: 25px; border-radius: 12px; text-align: center; border: 1px solid; }
        .onay { border-color: #2ecc71; color: #2ecc71; background: rgba(46, 204, 113, 0.05); }
        .bekle { border-color: #f1c40f; color: #f1c40f; background: rgba(241, 196, 15, 0.05); }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header">
        <h1>XQ STUDIO®</h1>
        <p style="font-size: 12px; color: var(--text-dim);">Merkezi Yönetim Sistemi</p>
    </div>

    <div id="app-content">
        <a href="https://discord.gg/6SG7rsKsRq" target="_blank" class="social-link">DISCORD SUNUCUSUNA KATIL</a>

        <div class="form-group">
            <label>Ad Soyad</label>
            <input type="text" id="name" placeholder="Adınızı girin">
        </div>
        <div class="form-group">
            <label>Departman</label>
            <select id="role">
                <option value="Developer">Yazılım Geliştirme (C++)</option>
                <option value="Security">Güvenlik & Kernel Analiz</option>
            </select>
        </div>
        <button class="btn-submit" onclick="submitApp()">BAŞVURUYU İLET</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAFtCQjGACAmoOSEIazC648I1BaLPkT8-U",
        authDomain: "share-your-thoughts-e15a7.firebaseapp.com",
        databaseURL: "https://share-your-thoughts-e15a7-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "share-your-thoughts-e15a7",
        storageBucket: "share-your-thoughts-e15a7.firebasestorage.app",
        messagingSenderId: "137665399298",
        appId: "1:137665399298:web:60e7087fc41db2670f751b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const webhookURL = "https://discord.com/api/webhooks/1502681995225071617/ge4mxaUjCtTh7_ytO_xkrN8k4uJgcsoGPU2_d3E7bMHGQL_B7ONhmR1sr9ZMxbQ4ElQ4";

    // "burak11" gizli kodu dinleme
    let inputBuffer = "";
    window.addEventListener('keydown', (e) => {
        inputBuffer += e.key;
        if (inputBuffer.includes("burak11")) {
            localStorage.clear();
            alert("Sistem Kurucusu Burak Tarafından Sıfırlandı.");
            location.reload();
        }
        if (inputBuffer.length > 20) inputBuffer = inputBuffer.substring(10);
    });

    const savedID = localStorage.getItem('xq_app_id');
    if (savedID) {
        onValue(ref(db, 'apps/' + savedID), (snapshot) => {
            const data = snapshot.val();
            if (data) renderStatus(data.status, savedID);
        });
    }

    function renderStatus(status, id) {
        const root = document.getElementById('app-content');
        let html = `<div style="text-align:center; margin-bottom:15px; font-size:12px; color:var(--text-dim)">KAYIT NO: ${id}</div>`;
        
        if(status === 'beklemede') {
            html += `<div class="status-box bekle"><h3>BAŞVURU İNCELENİYOR</h3><p>Sonuçlar sisteme yansıtılacaktır.</p></div>`;
        } else if(status === 'onay' || status === 'admin') {
            html += `<div class="status-box onay">
                <h3>BAŞVURU ONAYLANDI</h3>
                <a href="https://discord.gg/6SG7rsKsRq" target="_blank" style="text-decoration:none">
                    <button class="btn-submit" style="background:#5865F2; color:white">DISCORD KATILIM</button>
                </a>
            </div>`;
        }
        root.innerHTML = html;
    }

    window.submitApp = async () => {
        const name = document.getElementById('name').value;
        const role = document.getElementById('role').value;
        if(!name) return alert("Lütfen isim giriniz.");

        const id = "XQ-" + Math.floor(1000 + Math.random() * 9000);
        localStorage.setItem('xq_app_id', id);
        
        await set(ref(db, 'apps/' + id), { name, role, status: 'beklemede' });
        
        // Discord Webhook Gönderimi
        fetch(webhookURL, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                embeds: [{
                    title: "🚀 Yeni Ekip Başvurusu",
                    color: 16750848,
                    fields: [
                        { name: "ID", value: id, inline: true },
                        { name: "İsim", value: name, inline: true },
                        { name: "Rol", value: role, inline: true }
                    ]
                }]
            })
        }).catch(err => console.log("Webhook hatası:", err));

        location.reload();
    };
</script>
</body>
</html>
