<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XQ Studio® | Developer Portal</title>
    <style>
        :root { 
            --xq-orange: #ff9900; 
            --bg: #05070a; 
            --card: #0d1117; 
            --border: #30363d; 
            --text: #c9d1d9; 
            --text-dim: #8b949e;
            --whatsapp: #25D366;
            --discord: #5865F2;
            --gold: #ffcc00;
            --diamond: #00f2ff;
        }
        body { 
            background: var(--bg); 
            background-image: radial-gradient(circle at 50% 0%, #1a1f26 0%, transparent 50%);
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 20px; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .main-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 20px; 
            padding: 40px; width: 100%; max-width: 440px; box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            transition: 0.5s;
        }
        .header { text-align: center; margin-bottom: 35px; }
        .header h1 { color: var(--xq-orange); margin: 0; font-size: 30px; letter-spacing: 3px; font-weight: 900; }
        
        /* Profil Fotoğrafı Stili */
        .profile-img {
            width: 80px; height: 80px;
            border-radius: 50%;
            border: 3px solid var(--xq-orange);
            margin: 0 auto 15px;
            display: block;
            object-fit: cover;
        }

        .status-box { padding: 25px; border-radius: 15px; text-align: center; border: 2px solid transparent; }
        .onay { border-color: var(--whatsapp); background: rgba(37, 211, 102, 0.1); color: var(--whatsapp); }
        .red { border-color: #ff4444; background: rgba(255, 68, 68, 0.1); color: #ff4444; }
        .admin { border-color: var(--gold); box-shadow: 0 0 20px rgba(255, 204, 0, 0.4); color: var(--gold); animation: goldGlow 2s infinite alternate; }
        .kurucu { border-color: var(--diamond); box-shadow: 0 0 25px rgba(0, 242, 255, 0.5); color: var(--diamond); animation: diamondGlow 2s infinite alternate; }

        @keyframes goldGlow { from { box-shadow: 0 0 10px var(--gold); } to { box-shadow: 0 0 30px var(--gold); } }
        @keyframes diamondGlow { from { box-shadow: 0 0 10px var(--diamond); } to { box-shadow: 0 0 35px var(--diamond); } }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; margin-bottom: 5px; font-weight: 800; color: var(--text-dim); }
        input, select, textarea { 
            width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); 
            border-radius: 10px; color: white; outline: none; font-family: inherit;
        }
        textarea { resize: none; height: 80px; }
        .btn-submit { 
            width: 100%; padding: 18px; background: var(--xq-orange); color: black; 
            border: none; border-radius: 12px; font-weight: 900; cursor: pointer; margin-top: 10px;
        }
        .social-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .social-btn { padding: 10px; border-radius: 10px; text-decoration: none; color: white; font-weight: 700; font-size: 12px; text-align: center; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header">
        <h1 id="main-title">XQ STUDIO</h1>
        <p id="sub-tag" style="color:var(--text-dim); font-size:12px;">Geliştirici Başvuru Portalı</p>
    </div>

    <div id="dynamic-content">
        <div class="form-group">
            <label>AD SOYAD</label>
            <input type="text" id="full_name" placeholder="Burak XQ">
        </div>
        <div class="form-group">
            <label>YAŞ</label>
            <input type="number" id="user_age" placeholder="Örn: 18" min="10" max="99">
        </div>
        <div class="form-group">
            <label>PROFİL FOTOĞRAFI (URL)</label>
            <input type="url" id="profile_url" placeholder="https://resim-linki.com/foto.jpg">
        </div>
        <div class="form-group">
            <label>UZMANLIK</label>
            <select id="user_role">
                <option value="XqXLL Engine Developer (C++)">XqXLL Engine Developer (C++)</option>
                <option value="Research & Development (Araştırmacı)">Research & Development (Araştırmacı)</option>
            </select>
        </div>
        <div class="form-group">
            <label>KENDİNDEN BAHSET</label>
            <textarea id="user_bio" placeholder="Deneyimlerinden ve projelerinden bahset..."></textarea>
        </div>
        <button class="btn-submit" id="submit_trigger">BAŞVURUYU GÖNDER</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyAFtCQjGACAmoOSEIazC648I1BaLPkT8-U",
    authDomain: "share-your-thoughts-e15a7.firebaseapp.com",
    databaseURL: "https://share-your-thoughts-e15a7-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "share-your-thoughts-e15a7",
    storageBucket: "share-your-thoughts-e15a7.firebasestorage.app",
    appId: "1:137665399298:web:60e7087fc41db2670f751b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const webhookURL = "https://discord.com/api/webhooks/1502733551802519647/ZB_4VTXethUShwZn80vfTJG3uw3Z_JV363XI_AXBvVolk7IA8qAXXEVJQCXmzT_FdeO9";

document.getElementById("submit_trigger").onclick = async () => {
    const name = document.getElementById("full_name").value;
    const age = document.getElementById("user_age").value;
    const photo = document.getElementById("profile_url").value || "https://ui-avatars.com/api/?name=" + name;
    const role = document.getElementById("user_role").value;
    const bio = document.getElementById("user_bio").value;

    if(!name || !age || !bio) return alert("Lütfen boş alan bırakmayın.");

    const id = "XQ-" + Math.floor(1000 + Math.random() * 9000);
    
    await set(ref(db, 'apps/' + id), { name, age, photo, role, bio, status: 'beklemede' });
    localStorage.setItem('xq_app_id', id);
    
    await fetch(webhookURL, {
        method: 'POST', mode: 'no-cors', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ content: `🚀 **Yeni Başvuru**\n**ID:** \`${id}\`\n**İsim:** ${name} (${age})\n**Rol:** ${role}\n**Bio:** ${bio}` })
    });
    location.reload();
};

const activeApp = localStorage.getItem('xq_app_id');
if(activeApp) {
    onValue(ref(db, 'apps/' + activeApp), (snap) => {
        const d = snap.val();
        if(d) updateUI(d, activeApp);
    });
}

function updateUI(data, id) {
    const root = document.getElementById('dynamic-content');
    const tag = document.getElementById('sub-tag');
    const title = document.getElementById('main-title');
    
    let content = `<img src="${data.photo}" class="profile-img" onerror="this.src='https://ui-avatars.com/api/?name=${data.name}'">`;
    content += `<div class="status-box ${data.status}">`;

    const buttons = `
        <div class="social-container">
            <a href="https://discord.gg/6SG7rsKsRq" target="_blank" class="social-btn" style="background:var(--discord)">DISCORD</a>
            <a href="https://whatsapp.com/channel/0029VbCjhhZ8PgsFTg0Fcd3I" target="_blank" class="social-btn" style="background:var(--whatsapp)">WHATSAPP</a>
        </div>`;

    if(data.status === 'beklemede') {
        content += `<h3>İNCELENİYOR</h3><p>${data.name} (${data.age})<br>Başvurunuz kuyrukta.</p>`;
    } else if(data.status === 'red') {
        content += `<h3>REDDEDİLDİ</h3><p>Başvurunuz onaylanmadı.</p>`;
    } else {
        if(data.status === 'onay') content += `<h3>EKİP ÜYESİ</h3>`;
        if(data.status === 'admin') { content += `<h3>YÖNETİCİ</h3>`; tag.innerText = "XQ Studio Administrator"; }
        if(data.status === 'kurucu') { content += `<h3>KURUCU</h3>`; tag.innerText = "XQ Studio Founder"; title.style.color = "var(--diamond)"; }
        content += `<p>${data.name} (${data.age})</p>${buttons}`;
    }
    
    content += `</div>`;
    root.innerHTML = content;
}
</script>
</body>
</html>
