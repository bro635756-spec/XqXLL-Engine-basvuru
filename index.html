<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XQ Studio® | Resmi Başvuru Portalı</title>
    <style>
        :root { --xq-orange: #ff9900; --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 40px; width: 100%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: var(--xq-orange); text-align: center; margin-bottom: 10px; font-size: 24px; text-transform: uppercase; }
        p { text-align: center; font-size: 14px; color: #8b949e; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        input, select { width: 100%; padding: 12px; background: #0d1117; border: 1px solid var(--border); border-radius: 6px; color: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--xq-orange); }
        .checkbox-group { display: flex; align-items: flex-start; gap: 10px; font-size: 12px; margin-top: 20px; }
        .checkbox-group input { width: auto; margin-top: 3px; }
        button { width: 100%; padding: 14px; background: var(--xq-orange); border: none; border-radius: 6px; color: black; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        button:disabled { background: #30363d; color: #8b949e; cursor: not-allowed; }
        #status { text-align: center; margin-top: 15px; font-size: 14px; }
        .success { color: #238636; }
        .error { color: #da3633; }
    </style>
</head>
<body>

<div class="container" id="app-container">
    <h1>XQ STUDIO®</h1>
    <p>Geleceğin Teknolojisini Bizimle İnşa Edin</p>

    <div id="form-content">
        <div class="form-group">
            <label>Ad Soyad</label>
            <input type="text" id="name" placeholder="Örn: Burak Yılmaz">
        </div>

        <div class="form-group">
            <label>Yaş (10-18)</label>
            <input type="number" id="age" placeholder="Örn: 13">
        </div>

        <div class="form-group">
            <label>Uzmanlık Alanı</label>
            <select id="role">
                <option value="Kodlama (20 Kişi)">Geliştirici (20 Kişi/AI Serbest)</option>
                <option value="Güvenlik/Araştırma (15 Kişi)">Güvenlik & Analiz (15 Kişi)</option>
            </select>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="accept">
            <label for="accept">
                Maaş/ücret beklentim olmadığını, VS Insiders 2026 ve Discord PC kullanacağımı, şartları kabul ettiğimi onaylıyorum.
            </label>
        </div>

        <button onclick="sendApplication()" id="submit-btn">BAŞVURUYU GÖNDER</button>
        <div id="status"></div>
    </div>
</div>

<script>
    // Başvuru kontrolü (LocalStorage)
    window.onload = () => {
        if (localStorage.getItem('xq_applied')) {
            showAlreadyApplied();
        }
    };

    function showAlreadyApplied() {
        document.getElementById('form-content').innerHTML = `
            <div class="success" style="text-align: center; padding: 20px; border: 1px dashed #238636; border-radius: 8px;">
                <strong>BAŞVURU KAYDINIZ VAR</strong><br>
                Zaten başvuruda bulundunuz. Değerlendirme süreci Discord üzerinden yürütülecektir.
            </div>
        `;
    }

    async function sendApplication() {
        const name = document.getElementById('name').value;
        const age = document.getElementById('age').value;
        const role = document.getElementById('role').value;
        const accept = document.getElementById('accept').checked;
        const btn = document.getElementById('submit-btn');
        const status = document.getElementById('status');

        if (!name || !age || !accept) {
            status.innerHTML = '<span class="error">Lütfen tüm alanları doldurun ve şartları onaylayın.</span>';
            return;
        }

        btn.disabled = true;
        btn.innerText = "GÖNDERİLİYOR...";

        // Discord Webhook Payload
        const payload = {
            content: "🚀 **Yeni XQ Studio® Başvurusu Geldi!**",
            embeds: [{
                title: "Aday Bilgileri",
                color: 16750848, // Turuncu
                fields: [
                    { name: "İsim Soyisim", value: name, inline: true },
                    { name: "Yaş", value: age, inline: true },
                    { name: "Tercih Edilen Rol", value: role },
                    { name: "Durum", value: "AI Destekli Geliştirici / Araştırmacı" }
                ],
                footer: { text: "XQ Studio Recruitment System 2026" },
                timestamp: new Date()
            }]
        };

        try {
            const response = await fetch('https://discord.com/api/webhooks/1502681995225071617/ge4mxaUjCtTh7_ytO_xkrN8k4uJgcsoGPU2_d3E7bMHGQL_B7ONhmR1sr9ZMxbQ4ElQ4', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                localStorage.setItem('xq_applied', 'true'); // Başvuruyu kilitle
                status.innerHTML = '<span class="success">Başvurunuz başarıyla iletildi!</span>';
                setTimeout(() => showAlreadyApplied(), 2000);
            } else {
                throw new Error();
            }
        } catch (error) {
            status.innerHTML = '<span class="error">Hata: İletilemedi. Lütfen bağlantınızı kontrol edin.</span>';
            btn.disabled = false;
            btn.innerText = "BAŞVURUYU GÖNDER";
        }
    }
</script>

</body>
</html>
