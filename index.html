<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XQ Studio® | Hub & Recruitment</title>
    <style>
        :root { 
            --xq-orange: #ff9900; 
            --bg: #05070a; 
            --card: #0d1117; 
            --border: #30363d; 
            --text: #c9d1d9; 
            --term-green: #00ff41; 
            --admin-gold: #ffd700;
            --whatsapp: #25D366;
            --discord: #5865F2;
        }
        body { 
            background: var(--bg); 
            background-image: radial-gradient(circle at 50% 0%, #1a1f26 0%, transparent 50%);
            color: var(--text); 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
        }
        .container { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 30px; 
            width: 100%; 
            max-width: 550px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); 
            margin-bottom: 20px;
        }
        h1 { color: var(--xq-orange); text-align: center; margin: 0; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        .social-links { display: flex; gap: 10px; margin-top: 20px; justify-content: center; }
        .social-btn { flex: 1; padding: 12px; border-radius: 8px; text-decoration: none; color: white; font-weight: bold; text-align: center; font-size: 14px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-wa { background: var(--whatsapp); }
        .btn-dc { background: var(--discord); }
        .social-btn:hover { opacity: 0.8; transform: translateY(-2px); }

        input, select, button.submit-btn { width: 100%; padding: 14px; margin-top: 12px; background: #05070a; border: 1px solid var(--border); border-radius: 6px; color: white; box-sizing: border-box; }
        button.submit-btn { background: var(--xq-orange); color: black; font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; }
        
        .status-badge { padding: 20px; border-radius: 8px; text-align: center; margin-top: 15px; border: 1px solid; }
        .accepted { border-color: #2ecc71; background: rgba(46, 204, 113, 0.05); }
        .admin-role { border-color: var(--admin-gold); background: rgba(255, 215, 0, 0.05); }

        .terminal { background: #000; border: 1px solid var(--border); border-radius: 8px; width: 100%; max-width: 550px; height: 150px; padding: 15px; font-family: monospace; color: var(--term-green); overflow-y: auto; }
        #term-input { background: transparent; border: none; color: var(--term-green); outline: none; width: 70%; }
    </style>
</head>
<body>

<div class="container">
    <h1>XQ STUDIO® HUB</h1>
    
    <!-- Sosyal Medya Kanalları -->
    <div class="social-links">
        <a href="https://whatsapp.com/channel/0029VbCjhhZ8PgsFTg0Fcd3I" target="_blank" class="social-btn btn-wa">WHATSAPP KANALI</a>
        <a href="https://discord.gg/6SG7rsKsRq" target="_blank" class="social-btn btn-dc">DISCORD</a>
    </div>

    <hr style="border: 0; border-top: 1px solid var(--border); margin: 25px 0;">

    <div id="ui-content">
        <p style="text-align: center; font-size: 13px; color: #8b949e;">RESMİ BAŞVURU PANELİ</p>
        <input type="text" id="name" placeholder="Ad Soyad">
        <input type="number" id="age" placeholder="Yaş">
        <select id="role">
            <option value="Developer">Geliştirici (XqXLL / sCs++)</option>
            <option value="Security">Güvenlik & Analiz</option>
        </select>
        <button class="submit-btn" onclick="submitForm()">BAŞVURUYU GÖNDER</button>
    </div>
</div>

<div class="terminal" onclick="document.getElementById('term-input').focus()">
    <div id="term-history"><div>XQ_OS v1.0.6 Online.</div></div>
    <span>XQ@ROOT:~$</span> <input type="text" id="term-input" autocomplete="off">
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAFtCQjGACAmoOSEIazC648I1BaLPkT8-U",
        authDomain: "share-your-thoughts-e15a7.firebaseapp.com",
        databaseURL: "https://share-your-thoughts-e15a7-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "share-your-thoughts-e15a7",
        storageBucket: "share-your-thoughts-e15a7.firebasestorage.app",
        messagingSenderId: "137665399298",
        appId: "1:137665399298:web:60e7087fc41db2670f751b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const savedID = localStorage.getItem('xq_app_id');
    if (savedID) {
        onValue(ref(db, 'apps/' + savedID), (snapshot) => {
            const data = snapshot.val();
            if (data) updateUIStatus(data.status, savedID);
        });
    }

    function updateUIStatus(status, id) {
        let html = `<div style="text-align:center; color:var(--xq-orange); margin-bottom:10px;">ID: ${id}</div>`;
        if(status === 'beklemede') {
            html += `<div class="status-badge" style="color:#f1c40f;">⏳ İNCELENİYOR...</div>`;
        } else if(status === 'onay' || status === 'admin') {
            const isAdmin = status === 'admin';
            html += `<div class="status-badge ${isAdmin ? 'admin-role' : 'accepted'}">
                        <div style="font-weight:bold; color:${isAdmin ? 'var(--admin-gold)' : '#2ecc71'}">${isAdmin ? '👑 ADMIN YETKİSİ' : '✅ KABUL EDİLDİN!'}</div>
                        <p style="font-size:12px;">Ekibe katılımın onaylandı. Kanallara giriş yapabilirsin.</p>
                        <div class="social-links">
                            <a href="https://discord.gg/uvTBAErp" target="_blank" class="social-btn btn-dc">DISCORD'A GİR</a>
                        </div>
                        ${isAdmin ? '<div style="margin-top:10px; font-family:monospace; font-size:14px; color:var(--admin-gold)">KOD: XQ-ADM-CORE-2026</div>' : ''}
                     </div>`;
        } else if(status === 'red') {
            html += `<div class="status-badge" style="color:#e74c3c; border-color:#e74c3c;">❌ REDDEDİLDİ</div>`;
        }
        document.getElementById('ui-content').innerHTML = html;
    }

    window.submitForm = async () => {
        const name = document.getElementById('name').value;
        const age = document.getElementById('age').value;
        const role = document.getElementById('role').value;
        if(!name || !age) return alert("Bilgileri doldur!");

        const appID = "XQ-" + Math.floor(1000 + Math.random() * 9000);
        localStorage.setItem('xq_app_id', appID);
        await set(ref(db, 'apps/' + appID), { name, age, role, status: 'beklemede' });
        
        // Discord Webhook
        fetch("https://discord.com/api/webhooks/1502681995225071617/ge4mxaUjCtTh7_ytO_xkrN8k4uJgcsoGPU2_d3E7bMHGQL_B7ONhmR1sr9ZMxbQ4ElQ4", {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ content: `🚀 **Yeni Başvuru:** ${appID}\nİsim: ${name}\nRol: ${role}` })
        });
        location.reload();
    };

    document.getElementById('term-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const val = e.target.value.trim();
            const hist = document.getElementById('term-history');
            if (val === '.help') hist.innerHTML += `<div>> .help, /kaynaklar, /paketler</div>`;
            else if (val === 'burak11') {
                localStorage.clear();
                hist.innerHTML += `<div style="color:yellow">> [SİSTEM SIFIRLANDI]</div>`;
                setTimeout(() => location.reload(), 1000);
            }
            e.target.value = '';
        }
    });
</script>
</body>
</html>
