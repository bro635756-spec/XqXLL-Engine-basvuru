<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XQ Studio® | Developer Portal</title>
    <style>
        :root { 
            --xq-orange: #ff9900; 
            --bg: #05070a; 
            --card: #0d1117; 
            --border: #30363d; 
            --text: #c9d1d9; 
            --text-dim: #8b949e;
            --whatsapp: #25D366;
            --discord: #5865F2;
            --gold: #ffcc00;
            --diamond: #00f2ff;
        }
        body { 
            background: var(--bg); 
            background-image: radial-gradient(circle at 50% 0%, #1a1f26 0%, transparent 50%);
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 20px; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .main-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 20px; 
            padding: 40px; width: 100%; max-width: 440px; box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            transition: 0.5s;
        }
        .header { text-align: center; margin-bottom: 35px; }
        .header h1 { color: var(--xq-orange); margin: 0; font-size: 30px; letter-spacing: 3px; font-weight: 900; }
        
        /* DURUM TASARIMLARI */
        .status-box { padding: 25px; border-radius: 15px; text-align: center; border: 2px solid transparent; }
        
        .onay { border-color: var(--whatsapp); background: rgba(37, 211, 102, 0.1); color: var(--whatsapp); }
        .red { border-color: #ff4444; background: rgba(255, 68, 68, 0.1); color: #ff4444; }
        
        .admin { 
            border-color: var(--gold); 
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.4); 
            background: rgba(255, 204, 0, 0.05); 
            color: var(--gold);
            animation: goldGlow 2s infinite alternate;
        }
        
        .kurucu { 
            border-color: var(--diamond); 
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.5); 
            background: rgba(0, 242, 242, 0.05); 
            color: var(--diamond);
            animation: diamondGlow 2s infinite alternate;
        }

        @keyframes goldGlow { from { box-shadow: 0 0 10px var(--gold); } to { box-shadow: 0 0 30px var(--gold); } }
        @keyframes diamondGlow { from { box-shadow: 0 0 10px var(--diamond); } to { box-shadow: 0 0 35px var(--diamond); } }

        .social-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .social-btn { 
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 12px; border-radius: 12px; text-decoration: none; color: white;
            font-weight: 700; font-size: 13px; transition: 0.3s;
        }
        .btn-dc { background: var(--discord); }
        .btn-wa { background: var(--whatsapp); }
        
        .form-group { margin-bottom: 20px; }
        input, select { 
            width: 100%; padding: 14px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); 
            border-radius: 10px; color: white; outline: none;
        }
        .btn-submit { 
            width: 100%; padding: 18px; background: var(--xq-orange); color: black; 
            border: none; border-radius: 12px; font-weight: 900; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header">
        <h1>XQ STUDIO</h1>
        <p id="sub-tag" style="color:var(--text-dim); font-size:12px;">Geliştirici Başvuru Portalı</p>
    </div>

    <div id="dynamic-content">
        <!-- Başvuru Formu -->
        <div class="form-group">
            <label style="display:block; font-size:11px; margin-bottom:8px; font-weight:800;">AD SOYAD</label>
            <input type="text" id="full_name" placeholder="Burak XQ">
        </div>
        <div class="form-group">
            <label style="display:block; font-size:11px; margin-bottom:8px; font-weight:800;">UZMANLIK</label>
            <select id="user_role">
                <option value="XqXLL Engine Developer (C++)">XqXLL Engine Developer (C++)</option>
                <option value="Research & Development (Araştırmacı)">Research & Development (Araştırmacı)</option>
            </select>
        </div>
        <button class="btn-submit" id="submit_trigger">BAŞVURUYU GÖNDER</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyAFtCQjGACAmoOSEIazC648I1BaLPkT8-U",
    authDomain: "share-your-thoughts-e15a7.firebaseapp.com",
    databaseURL: "https://share-your-thoughts-e15a7-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "share-your-thoughts-e15a7",
    storageBucket: "share-your-thoughts-e15a7.firebasestorage.app",
    appId: "1:137665399298:web:60e7087fc41db2670f751b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const webhookURL = "https://discord.com/api/webhooks/1502733551802519647/ZB_4VTXethUShwZn80vfTJG3uw3Z_JV363XI_AXBvVolk7IA8qAXXEVJQCXmzT_FdeO9";

// burak11 reset
let k = ""; window.addEventListener('keydown',(e)=>{k+=e.key;if(k.includes("burak11")){localStorage.clear();location.reload();}});

document.getElementById("submit_trigger").onclick = async () => {
    const name = document.getElementById("full_name").value;
    const role = document.getElementById("user_role").value;
    if(!name) return alert("İsim yaz.");
    const id = "XQ-" + Math.floor(1000 + Math.random() * 9000);
    
    await set(ref(db, 'apps/' + id), { name, role, status: 'beklemede' });
    localStorage.setItem('xq_app_id', id);
    
    await fetch(webhookURL, {
        method: 'POST', mode: 'no-cors', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ content: `🚀 **Yeni Başvuru**\n**ID:** \`${id}\`\n**İsim:** ${name}\n**Rol:** ${role}` })
    });
    location.reload();
};

const activeApp = localStorage.getItem('xq_app_id');
if(activeApp) {
    onValue(ref(db, 'apps/' + activeApp), (snap) => {
        const d = snap.val();
        if(d) updateUI(d.status, activeApp);
    });
}

function updateUI(status, id) {
    const root = document.getElementById('dynamic-content');
    const tag = document.getElementById('sub-tag');
    let content = `<div class="status-box ${status}">`;
    let buttons = `
        <div class="social-container">
            <a href="https://discord.gg/6SG7rsKsRq" target="_blank" class="social-btn btn-dc">DISCORD</a>
            <a href="https://wa.me/mesajlinki" target="_blank" class="social-btn btn-wa">WHATSAPP</a>
        </div>`;

    if(status === 'beklemede') {
        content += `<h3>İNCELEMEDE</h3><p>ID: ${id}<br>Başvurunuz kontrol ediliyor.</p>`;
    } else if(status === 'red') {
        content += `<h3>BAŞVURU REDDEDİLDİ</h3><p>Üzgünüz, kriterlerimize uygun bulunmadınız.</p>`;
    } else if(status === 'onay') {
        content += `<h3>KABUL EDİLDİ</h3><p>Ekibe hoş geldin!</p>${buttons}`;
    } else if(status === 'admin') {
        tag.innerText = "XQ Studio Administrator";
        content += `<h3>ADMIN YETKİSİ</h3><p>Yönetim paneline erişim sağlandı.</p>${buttons}`;
    } else if(status === 'kurucu') {
        tag.innerText = "XQ Studio Founder";
        content += `<h3>KURUCU ERİŞİMİ</h3><p>Sistem sahibi onaylandı. Merhaba Burak.</p>${buttons}`;
    }
    
    content += `</div>`;
    root.innerHTML = content;
}
</script>
</body>
</html>
