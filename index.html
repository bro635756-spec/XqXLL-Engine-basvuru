<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XQ Studio® | Neural Recruitment System</title>
    <style>
        :root { 
            --xq-orange: #ff9900; 
            --bg: #05070a; 
            --card: #0d1117; 
            --border: #30363d; 
            --text: #c9d1d9; 
            --term-green: #00ff41; 
            --admin-gold: #ffd700;
        }
        body { 
            background: var(--bg); 
            background-image: radial-gradient(circle at 50% 0%, #1a1f26 0%, transparent 50%);
            color: var(--text); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
        }
        .container { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 35px; 
            width: 100%; 
            max-width: 600px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); 
            margin-bottom: 25px; 
            position: relative;
            overflow: hidden;
        }
        .container::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: var(--xq-orange);
        }
        h1 { color: var(--xq-orange); text-align: center; margin: 0; font-size: 24px; text-transform: uppercase; letter-spacing: 3px; }
        .info-text { text-align: center; font-size: 13px; color: #8b949e; margin-bottom: 25px; letter-spacing: 1px; }
        input, select, button { width: 100%; padding: 14px; margin-top: 12px; background: #05070a; border: 1px solid var(--border); border-radius: 6px; color: white; box-sizing: border-box; font-family: inherit; }
        input:focus, select:focus { border-color: var(--xq-orange); outline: none; }
        button { background: var(--xq-orange); color: black; font-weight: bold; cursor: pointer; border: none; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px; }
        button:hover { background: #e68a00; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 153, 0, 0.3); }
        
        .terminal { background: #000; border: 1px solid #1f2428; border-radius: 8px; width: 100%; max-width: 600px; height: 180px; padding: 15px; font-family: 'Courier New', monospace; font-size: 14px; overflow-y: auto; color: var(--term-green); box-shadow: inset 0 0 10px rgba(0,255,65,0.05); }
        #term-input { background: transparent; border: none; color: var(--term-green); outline: none; width: 80%; padding: 0; margin: 0; }
        
        /* Status Badges */
        .status-badge { padding: 25px 20px; border-radius: 8px; text-align: center; margin-top: 15px; border: 1px solid; animation: fadeIn 0.5s ease-in-out; }
        .pending { color: #f1c40f; border-color: #f1c40f; background: rgba(241, 196, 15, 0.05); }
        .accepted { color: #2ecc71; border-color: #2ecc71; background: rgba(46, 204, 113, 0.05); }
        .rejected { color: #e74c3c; border-color: #e74c3c; background: rgba(231, 76, 60, 0.05); }
        .admin-role { color: var(--admin-gold); border-color: var(--admin-gold); background: rgba(255, 215, 0, 0.05); box-shadow: 0 0 20px rgba(255, 215, 0, 0.15); }
        
        .status-title { font-size: 18px; font-weight: bold; margin-bottom: 8px; }
        .status-desc { font-size: 12px; opacity: 0.8; line-height: 1.5; }
        .admin-code { display: inline-block; margin-top: 10px; padding: 8px 15px; background: rgba(255, 215, 0, 0.1); border: 1px dashed var(--admin-gold); border-radius: 4px; font-family: monospace; font-size: 16px; letter-spacing: 2px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>XQ STUDIO®</h1>
    <p class="info-text">Secure Recruitment & Access Terminal v1.0.5</p>

    <div id="ui-content">
        <input type="text" id="name" placeholder="Ad Soyad" autocomplete="off">
        <input type="number" id="age" placeholder="Yaş">
        <select id="role">
            <option value="Developer">Geliştirici (sCs++ / AI Desteği Serbest)</option>
            <option value="Security">Güvenlik, Analiz & Sistem Denetimi</option>
        </select>
        <div style="font-size: 12px; margin-top: 15px; color: #8b949e; display: flex; align-items: flex-start; gap: 8px;">
            <input type="checkbox" id="accept" style="width: auto; margin-top: 2px;"> 
            <label for="accept">Gelişim odaklı, maaşsız vizyon projesi olduğunu; VS Insiders 2026 ve Discord PC kullanımının zorunlu olduğunu kabul ediyorum.</label>
        </div>
        <button onclick="submitForm()">BAŞVURUYU SİSTEME İLET</button>
    </div>
</div>

<div class="terminal" id="terminal-box" onclick="document.getElementById('term-input').focus()">
    <div id="term-history">
        <div>XQ_OS [Kernel.10.5] - Initialization Complete.</div>
        <div style="color: #666;">Kurucu: Burak | XQ Studio Engine.</div>
    </div>
    <div style="display: flex; margin-top: 5px;">
        <span style="margin-right: 8px;">XQ@ROOT:~$</span>
        <input type="text" id="term-input" autocomplete="off" spellcheck="false">
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAFtCQjGACAmoOSEIazC648I1BaLPkT8-U",
        authDomain: "share-your-thoughts-e15a7.firebaseapp.com",
        databaseURL: "https://share-your-thoughts-e15a7-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "share-your-thoughts-e15a7",
        storageBucket: "share-your-thoughts-e15a7.firebasestorage.app",
        messagingSenderId: "137665399298",
        appId: "1:137665399298:web:60e7087fc41db2670f751b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const webHook = "https://discord.com/api/webhooks/1502681995225071617/ge4mxaUjCtTh7_ytO_xkrN8k4uJgcsoGPU2_d3E7bMHGQL_B7ONhmR1sr9ZMxbQ4ElQ4";

    const savedID = localStorage.getItem('xq_app_id');
    if (savedID) {
        const statusRef = ref(db, 'apps/' + savedID);
        onValue(statusRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                updateUIStatus(data.status, savedID);
            }
        });
    }

    function updateUIStatus(status, id) {
        let html = `<div class="info-text" style="color:var(--xq-orange); font-weight:bold;">SİSTEM ID: ${id}</div>`;
        
        if(status === 'beklemede') {
            html += `<div class="status-badge pending">
                        <div class="status-title">⏳ BAŞVURUNUZ İNCELENİYOR</div>
                        <div class="status-desc">Verileriniz sisteme kaydedildi. Değerlendirme süreci maksimum 5 gün sürecektir.</div>
                     </div>`;
        } else if(status === 'onay') {
            html += `<div class="status-badge accepted">
                        <div class="status-title">✅ TEBRİKLER, EKİBE ALINDINIZ!</div>
                        <div class="status-desc">XQ Studio geliştirici kadrosuna kabul edildiniz. Discord üzerinden erişim sağlanacaktır.</div>
                     </div>`;
        } else if(status === 'red') {
            html += `<div class="status-badge rejected">
                        <div class="status-title">❌ BAŞVURU ONAYLANMADI</div>
                        <div class="status-desc">Kriterlerimize ve mevcut proje ihtiyaçlarımıza şu an için uygun bulunmadınız.</div>
                     </div>`;
        } else if(status === 'admin') {
            html += `<div class="status-badge admin-role">
                        <div class="status-title">👑 XQ YÖNETİCİ (ADMIN) YETKİSİ</div>
                        <div class="status-desc">Tebrikler! Kurucu tarafından Yönetici olarak atandınız. Lütfen aşağıdaki gizli erişim kodunu yetkiliye iletin.</div>
                        <div class="admin-code">XQ-ADM-CORE-2026</div>
                     </div>`;
        }
        document.getElementById('ui-content').innerHTML = html;
    }

    window.submitForm = async () => {
        const name = document.getElementById('name').value;
        const age = document.getElementById('age').value;
        const role = document.getElementById('role').value;
        if (!name || !age || !document.getElementById('accept').checked) {
            alert("Sisteme veri gönderebilmek için tüm alanları doldurmalı ve şartları onaylamalısınız.");
            return;
        }

        const appID = "XQ-" + Math.floor(1000 + Math.random() * 9000);
        localStorage.setItem('xq_app_id', appID);
        document.getElementById('ui-content').innerHTML = `<div style="text-align:center; padding: 40px; color: var(--xq-orange);">VERİLER İŞLENİYOR...</div>`;

        await set(ref(db, 'apps/' + appID), { name, age, role, status: 'beklemede' });

        await fetch(webHook, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                content: `🚨 **SİSTEME YENİ BAŞVURU GİRİŞİ** 🚨\n\n**ID:** \`${appID}\`\n**Aday Adı:** ${name}\n**Yaş:** ${age}\n**Hedeflenen Rol:** ${role}\n\n*İşlem:* Firebase 'status' satırını \`onay\`, \`red\` veya \`admin\` olarak güncelleyin.`
            })
        });
        location.reload();
    };

    document.getElementById('term-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const val = e.target.value.trim();
            const hist = document.getElementById('term-history');
            
            if (val === '.help') {
                hist.innerHTML += `<div>> Geçerli Komutlar: .help, /kayıt, /kaynaklar, /paketler</div>`;
            } else if (val === 'burak11') {
                localStorage.clear();
                hist.innerHTML += `<div style="color:yellow">> [SYSTEM OVERRIDE] Yerel kimlik verileri temizlendi. Reboot ediliyor...</div>`;
                setTimeout(() => location.reload(), 1200);
            } else if (val === '/kaynaklar') {
                hist.innerHTML += `<div>> Donanım/Yazılım: Visual Studio Insiders 2026, Discord PC. AI (Gemini, ChatGPT) kullanımı teşvik edilir.</div>`;
            } else if (val === '/paketler') {
                hist.innerHTML += `<div>> Altyapı: OpenGL 4.6 (Vulkan SDK opsiyonel), sCs++ Kernel Mimarisi, XqXLL 3.5D Engine.</div>`;
            } else if (val !== '') {
                hist.innerHTML += `<div style="color:red">> SYNTAX ERROR: '${val}' tanınmayan komut.</div>`;
            }
            
            e.target.value = '';
            document.getElementById('terminal-box').scrollTop = 9999;
        }
    });
</script>
</body>
</html>
