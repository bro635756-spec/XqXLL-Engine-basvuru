<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XQ Studio® | Developer Portal</title>
    <style>
        :root { 
            --xq-orange: #ff9900; 
            --bg: #05070a; 
            --card: #0d1117; 
            --border: #30363d; 
            --text: #c9d1d9; 
            --text-dim: #8b949e;
            --whatsapp: #25D366;
            --discord: #5865F2;
        }
        body { 
            background: var(--bg); 
            background-image: radial-gradient(circle at 50% 0%, #1a1f26 0%, transparent 50%);
            color: var(--text); 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; padding: 20px; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .main-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 20px; 
            padding: 40px; width: 100%; max-width: 440px; box-shadow: 0 25px 50px rgba(0,0,0,0.8); 
        }
        .header { text-align: center; margin-bottom: 35px; }
        .header h1 { color: var(--xq-orange); margin: 0; font-size: 30px; letter-spacing: 3px; font-weight: 900; }
        
        .social-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .social-btn { 
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 12px; border-radius: 12px; text-decoration: none; color: white;
            font-weight: 700; font-size: 13px; transition: 0.3s ease;
        }
        .btn-dc { background: var(--discord); }
        .btn-wa { background: var(--whatsapp); }
        .social-btn img { width: 22px; height: 22px; object-fit: contain; }
        .social-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }
        input, select { 
            width: 100%; padding: 14px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); 
            border-radius: 10px; color: white; font-size: 15px; box-sizing: border-box; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--xq-orange); background: rgba(0,0,0,0.5); }

        .btn-submit { 
            width: 100%; padding: 18px; background: var(--xq-orange); color: black; 
            border: none; border-radius: 12px; font-weight: 900; font-size: 16px; 
            cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        .btn-submit:hover { background: #e68a00; transform: scale(1.02); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

        .status-ui { padding: 30px; border-radius: 15px; text-align: center; border: 2px solid; animation: fadeIn 0.5s ease; }
        .status-pending { border-color: #f1c40f; background: rgba(241, 196, 15, 0.1); color: #f1c40f; }
        .status-success { border-color: #2ecc71; background: rgba(46, 204, 113, 0.1); color: #2ecc71; }
        
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header">
        <h1>XQ STUDIO</h1>
        <p style="color: var(--text-dim); font-size: 13px; margin-top: 5px;">Geliştirici Başvuru Portalı</p>
    </div>

    <div id="dynamic-content">
        <div class="social-container">
            <a href="https://discord.gg/6SG7rsKsRq" target="_blank" class="social-btn btn-dc">
                <img src="logod.png" alt="Discord"> DISCORD
            </a>
            <a href="https://whatsapp.com/channel/0029VbCjhhZ8PgsFTg0Fcd3I" target="_blank" class="social-btn btn-wa">
                <img src="logow.png" alt="WhatsApp"> WHATSAPP
            </a>
        </div>

        <div class="form-group">
            <label>Ad Soyad</label>
            <input type="text" id="full_name" placeholder="Örn: Burak XQ">
        </div>
        <div class="form-group">
            <label>Uzmanlık Alanı</label>
            <select id="user_role">
                <option value="C++ Developer">C++ Developer (XqXLL)</option>
                <option value="UE5 Expert">Unreal Engine 5 Expert</option>
                <option value="Security">Cyber Security & Kernel</option>
            </select>
        </div>
        <button class="btn-submit" id="submit_trigger" onclick="handleApplication()">BAŞVURUYU GÖNDER</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

    const config = {
        apiKey: "AIzaSyAFtCQjGACAmoOSEIazC648I1BaLPkT8-U",
        authDomain: "share-your-thoughts-e15a7.firebaseapp.com",
        databaseURL: "https://share-your-thoughts-e15a7-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "share-your-thoughts-e15a7",
        storageBucket: "share-your-thoughts-e15a7.firebasestorage.app",
        messagingSenderId: "137665399298",
        appId: "1:137665399298:web:60e7087fc41db2670f751b"
    };

    const app = initializeApp(config);
    const db = getDatabase(app);
    const hook = "https://discord.com/api/webhooks/1502681995225071617/ge4mxaUjCtTh7_ytO_xkrN8k4uJgcsoGPU2_d3E7bMHGQL_B7ONhmR1sr9ZMxbQ4ElQ4";

    // Gizli Sıfırlama: burak11
    let keys = "";
    window.addEventListener('keydown', (e) => {
        keys += e.key;
        if (keys.includes("burak11")) {
            localStorage.clear();
            alert("SİSTEM RESETLENDİ");
            location.reload();
        }
        if (keys.length > 10) keys = keys.substring(1);
    });

    const activeApp = localStorage.getItem('xq_app_id');
    if (activeApp) {
        onValue(ref(db, 'apps/' + activeApp), (snapshot) => {
            const val = snapshot.val();
            if (val) showStatus(val.status, activeApp);
        });
    }

    function showStatus(status, id) {
        const root = document.getElementById('dynamic-content');
        let html = `<div style="text-align:center; margin-bottom:15px; font-family:monospace; font-size:11px;">AUTH_ID: ${id}</div>`;
        
        if(status === 'beklemede') {
            html += `<div class="status-ui status-pending"><h3>İNCELEME SÜRÜYOR</h3><p>Başvurunuz XQ Studio yöneticilerine iletildi.</p></div>`;
        } else if(status === 'onay' || status === 'admin') {
            html += `<div class="status-ui status-success">
                <h3>BAŞVURU KABUL EDİLDİ</h3>
                <p>Ekibimize hoş geldiniz! Sunucuya giriş yapabilirsiniz.</p>
                <a href="https://discord.gg/6SG7rsKsRq" target="_blank" style="text-decoration:none">
                    <button class="btn-submit" style="background:var(--discord); color:white; margin-top:15px;">DISCORD'A GİRİŞ</button>
                </a>
            </div>`;
        }
        root.innerHTML = html;
    }

    window.handleApplication = async () => {
        const name = document.getElementById('full_name').value;
        const role = document.getElementById('user_role').value;
        const btn = document.getElementById('submit_trigger');

        if(!name || name.length < 3) return alert("Geçerli bir isim giriniz.");

        btn.disabled = true;
        btn.innerText = "İŞLENİYOR...";

        const appID = "XQ-" + Math.floor(1000 + Math.random() * 8999);
        
        try {
            await set(ref(db, 'apps/' + appID), { name, role, status: 'beklemede' });
            localStorage.setItem('xq_app_id', appID);

            // Webhook Gönderimi
            await fetch(hook, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    content: `📢 **Yeni Başvuru Alındı**\n**Sistem ID:** \`${appID}\`\n**Aday:** ${name}\n**Rol:** ${role}`
                })
            });

            location.reload();
        } catch (e) {
            alert("Bağlantı hatası.");
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
